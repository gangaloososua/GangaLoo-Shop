[build]
  functions = "GangaLOO Shop/netlify/functions"
  publish = "GangaLOO Shop"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "GangaLOO Shop/store.html,GangaLOO Shop/admin.html,GangaLOO Shop/admin-v2.html,GangaLOO Shop/pos.html,GangaLOO Shop/index.html,GangaLOO Shop/seller-signup.html,GangaLOO Shop/netlify/functions/create-paypal.js,GangaLOO Shop/netlify/functions/capture-paypal.js,GangaLOO Shop/netlify/functions/create-checkout.js,GangaLOO Shop/netlify/functions/stripe-webhook.js,GangaLOO Shop/club-gangaloo.html,GangaLOO Shop/config.js,GangaLOO Shop/wholesale.html,GangaLOO Shop/gangaloo-landing.html,GangaLOO Shop/partners.html,GangaLOO Shop/aliexpress.html,GangaLOO Shop/netlify/functions/aliexpress-api.js,GangaLOO Shop/gangaloo-client-form.html,GangaLOO Shop/inject-config.sh"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
