[build]
  command = "printf 'window.__SUPA_URL__=\"%s\";window.__SUPA_KEY__=\"%s\";' \"$SUPABASE_URL\" \"$SUPABASE_ANON_KEY\" > 'GangaLOO Shop/config.js'"
  publish = "GangaLOO Shop"

[build.environment]
  # Add SUPABASE_URL and SUPABASE_ANON_KEY in:
  # Netlify Dashboard → Site Settings → Environment Variables
